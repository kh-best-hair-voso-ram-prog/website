<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOSO HAIR SALON & RAM HAIR STUDIO | 高雄精品美髮美學</title>
<style>
:root {
    --main-bg: #ffffff;
    --accent: #111111;
    --gold: #a68a56;
    --gray: #f2f2f2;
}
body {
    font-family: "PingFang TC", "Helvetica Neue", sans-serif;
    margin: 0;
    color: #1a1a1a;
    background: var(--main-bg);
    line-height: 1.7;
}
/* 側邊常駐預約 */
.side-booking {
    position: fixed;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 15px;
}
.side-item {
    width: 55px;
    height: 55px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--gold);
    transition: 0.3s;
}
.side-item:hover {
    transform: scale(1.1);
    box-shadow: 0 6px 20px rgba(0,0,0,0.2);
}
.side-item img {
    width: 32px;
    height: 32px;
    display: block;
    border: none;
}
.side-label {
    position: absolute;
    right: 70px;
    background: var(--accent);
    color: white;
    padding: 6px 14px;
    border-radius: 4px;
    opacity: 0;
    transition: 0.3s;
    white-space: nowrap;
}
.side-item:hover .side-label {
    opacity: 1;
    right: 75px;
}
/* 導航 */
nav {
    padding: 25px 5%;
    display: flex;
    justify-content: center;
    border-bottom: 1px solid #f2f2f2;
    background: white;
    position: sticky;
    top: 0;
    z-index: 999;
}
.logo {
    font-size: 1.4em;
    letter-spacing: 6px;
    font-weight: 300;
    text-align: center;
    color: #000;
}
/* Banner */
.hero {
    height: 75vh;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
}
.hero-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.65;
}
.hero-text {
    position: absolute;
    color: white;
    text-align: center;
}
.hero-text h2 {
    font-size: 3.2em;
    font-weight: 200;
    letter-spacing: 12px;
    margin: 0;
    text-shadow: 0 2px 10px rgba(0,0,0,0.3);
}
.hero-text p {
    font-size: 0.9em;
    letter-spacing: 6px;
    margin-top: 15px;
    color: rgba(255,255,255,0.8);
}
.container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 100px 20px;
}
/* 分店導引 */
.store-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 40px;
    margin-bottom: 120px;
}
.store-card {
    padding: 50px 30px;
    border: 1px solid #eee;
    transition: 0.4s;
    text-align: center;
    border-radius: 2px;
}
.store-card:hover {
    border-color: var(--gold);
    background: #fafafa;
    transform: translateY(-3px);
}
.store-card h3 {
    font-size: 1.6em;
    letter-spacing: 4px;
    margin-bottom: 20px;
    color: #111;
}
.store-links {
    margin-top: 25px;
}
.store-link {
    text-decoration: none;
    color: var(--gold);
    font-size: 0.85em;
    border-bottom: 1px solid var(--gold);
    padding-bottom: 3px;
}
.store-link:hover {
    color: #000;
    border-color: #000;
}
/* 文章作品區 */
.section-title {
    font-size: 1.8em;
    letter-spacing: 5px;
    text-align: center;
    margin-bottom: 60px;
    position: relative;
    font-weight: 300;
}
.section-title::after {
    content: '';
    display: block;
    width: 35px;
    height: 2px;
    background: var(--gold);
    margin: 25px auto;
}
.news-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 40px;
}
.news-item {
    text-decoration: none;
    color: inherit;
    display: block;
}
.news-img {
    width: 100%;
    aspect-ratio: 16/10;
    background: var(--gray);
    overflow: hidden;
    position: relative;
    transition: 0.4s;
}
.news-img:hover {
    transform: scale(1.02);
}
.news-img .placeholder {
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #bbb;
    font-size: 0.8em;
}
.news-item h4 {
    margin-top: 18px;
    font-weight: 400;
    letter-spacing: 1px;
}
</style>
</head>
<body>
<!-- 側邊預約 -->
<div class="side-booking">
    <div class="side-item">
        <span class="side-label">線上預約</span>
    </div>
    <div class="side-item">
        <span class="side-label">店家IG</span>
    </div>
</div>

<!-- 導航 -->
<nav>
    <div class="logo">VOSO & RAM HAIR STUDIO</div>
</nav>

<!-- Banner 首頁大圖 -->
<section class="hero">
    <div class="hero-text">
        <h2>高雄精緻美髮造型</h2>
        <p>專業剪髮｜燙染護｜客製化髮型設計</p>
    </div>
</section>

<!-- 店家介紹 -->
<div class="container">
    <h2 class="section-title">兩間高雄在地沙龍</h2>
    <div class="store-grid">
        <div class="store-card">
            <h3>VOSO HAIR 左營裕誠店</h3>
            <p>高雄左營區裕誠路280號<br>預約專線：XXX-XXX-XXX</p>
            <div class="store-links">
                <a href="#" class="store-link">地圖導航</a>
            </div>
        </div>
        <div class="store-card">
            <h3>RAM HAIR STUDIO 鼓山店</h3>
            <p>高雄鼓山區南屏路266號<br>預約專線：XXX-XXX-XXX</p>
            <div class="store-links">
                <a href="#" class="store-link">地圖導航</a>
            </div>
        </div>
    </div>

    <h2 class="section-title">2026 流行髮型文章</h2>
    <div class="news-grid">
        <a href="#" class="news-item">
            <div class="news-img">
                <div class="placeholder">髮型示意圖</div>
            </div>
            <h4>圓臉適合短髮推薦｜修飾臉型不踩雷</h4>
        </a>
        <a href="#" class="news-item">
            <div class="news-img">
                <div class="placeholder">髮型示意圖</div>
            </div>
            <h4>韓系Wolf Cut 狼尾短髮男女都適合</h4>
        </a>
        <a href="#" class="news-item">
            <div class="news-img">
                <div class="placeholder">髮型示意圖</div>
            </div>
            <h4>顯白髮色大全｜亞黃膠必染溫柔色系</h4>
        </a>
    </div>
</div>
</body>
</html>
